name: Backend CI

on:
  push:
    branches: [main]
    paths: ['backend/**']
  pull_request:
    paths: ['backend/**']

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install ruff

      - name: Lint
        working-directory: backend
        run: ruff check src/ --ignore E501

      - name: Check syntax
        working-directory: backend
        run: python -c "import ast, os; [ast.parse(open(f).read()) for f in (p for root, _, files in os.walk('src') for f in files if f.endswith('.py') for p in [os.path.join(root, f)])]"
